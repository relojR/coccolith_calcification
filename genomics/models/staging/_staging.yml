version: 2

models:
  - name: stg_species
    description: "One row per species with its calcification phenotype."
    columns:
      - name: species_label
        description: "OrthoFinder header / FASTA filename stem. Primary key."
        tests:
          - not_null
          - unique
      - name: is_calcifying
        description: "Whether the species produces coccoliths (calcite)."
        tests:
          - not_null

  - name: stg_orthogroup_membership
    description: "Long format: one row per (orthogroup, species, protein)."
    columns:
      - name: orthogroup_id
        tests:
          - not_null
      - name: species_label
        description: "Must match a species in stg_species."
        tests:
          - not_null
          - relationships:
              to: ref('stg_species')
              field: species_label
      - name: protein_id
        tests:
          - not_null
          - unique